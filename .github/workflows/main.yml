name: Flet Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Android Dependencies
        run: |
          pip install flet google-generativeai requests

      - name: Build Android APK
        run: |
          flet build apk --no-config

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lina-Intelligence-APK
          path: build/apk/*.apk
          
